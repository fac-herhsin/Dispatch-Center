<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業調度管理系統 - 穩定修復版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Microsoft JhengHei", sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        .card-bg { background-color: #1e293b; }
        
        /* 列印區域強化 - 確保在 iframe/預覽中也能正確觸發 */
        @media print {
            #app, .no-print, nav { display: none !important; }
            body, html { background: white !important; color: black !important; overflow: visible !important; height: auto !important; }
            #print-area { 
                display: block !important; 
                visibility: visible !important; 
                width: 100% !important; 
                position: absolute; 
                left: 0; 
                top: 0; 
                z-index: 9999;
            }
            .print-page { 
                page-break-after: always; 
                color: black !important; 
                padding: 30px;
                border-bottom: 2px solid #000;
            }
            table { width: 100%; border-collapse: collapse; margin: 20px 0; border: 1px solid black; }
            th, td { border: 1px solid black !important; padding: 12px; text-align: left; color: black !important; }
            .sign-section { display: flex; justify-content: space-between; margin-top: 50px; }
            .sign-box { border-bottom: 1px solid black; width: 200px; padding-bottom: 5px; }
        }
        
        #print-area { display: none; }

        .loader-ring {
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-left-color: #f97316;
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-rotate { animation: spin 1s linear infinite; }
    </style>
</head>
<body>

    <div id="app">
        <!-- 初始載入 UI -->
        <div id="init-loader" class="flex flex-col items-center justify-center min-h-screen">
            <div class="loader-ring mb-4"></div>
            <p id="loader-text" class="text-orange-500 font-bold tracking-widest uppercase animate-pulse">系統連線中...</p>
        </div>
    </div>

    <!-- 獨立列印 DOM -->
    <div id="print-area"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. Firebase 配置
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let state = {
            user: null,
            role: 'portal',
            orders: [],
            view: 'dashboard',
            isInited: false,
            isSyncing: false
        };

        // 2. 核心啟動流程 (修正卡死問題)
        async function bootstrap() {
            try {
                // 先進行認證 (Rule 3)
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }

                // 認證成功後啟動監聽
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        state.user = user;
                        if (!state.isInited) {
                            await fetchData(); // 獲取第一手資料
                            state.isInited = true;
                            render();
                        }
                    }
                });
            } catch (err) {
                console.error("Bootstrap Error:", err);
                const loaderText = document.getElementById('loader-text');
                if (loaderText) loaderText.innerHTML = "連線失敗<br><button onclick='location.reload()' class='mt-4 text-xs underline'>點此重試</button>";
            }
        }

        // 3. 資料獲取 (Rule 2)
        async function fetchData() {
            if (!state.user) return;
            state.isSyncing = true;
            render();
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                const snap = await getDocs(colRef);
                const results = [];
                snap.forEach(d => results.push({ id: d.id, ...d.data() }));
                // 在記憶體中進行排序
                state.orders = results.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            } catch (err) {
                console.error("Data Fetch Error:", err);
            } finally {
                state.isSyncing = false;
                render();
            }
        }

        // --- 全域功能函數 ---
        window.handleDelete = async (id) => {
            if (state.role !== 'admin') return;
            if (!confirm("確定要刪除這筆單據嗎？此操作不可復原。")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id));
                state.orders = state.orders.filter(o => o.id !== id);
                render();
            } catch (err) {
                alert("刪除失敗，請檢查權限");
            }
        };

        window.handlePrint = (id = null) => {
            let targets = [];
            if (id) {
                const target = state.orders.find(o => o.id === id);
                if (target) targets = [target];
            } else {
                targets = state.orders.filter(o => o.status !== '結案');
            }

            if (targets.length === 0) return alert("無可列印內容");

            const printContainer = document.getElementById('print-area');
            printContainer.innerHTML = targets.map(o => `
                <div class="print-page">
                    <h1 style="text-align:center; font-size:28px; margin-bottom:5px;">企業調度管理系統 - 配送單</h1>
                    <p style="text-align:center; font-size:12px;">列印時間：${new Date().toLocaleString()}</p>
                    <div style="margin:20px 0; border-top:1px solid #eee; padding-top:10px;">
                        <p>單據編號：#${o.id.toUpperCase()}</p>
                        <p>建立日期：${o.createdAt}</p>
                    </div>
                    <table>
                        <tr><th style="width:30%">任務類別</th><td>${o.type}</td></tr>
                        <tr><th>目標廠商</th><td><b style="font-size:18px;">${o.target}</b></td></tr>
                        <tr><th>品項明細</th><td>
                            ${o.items.map(i => `• ${i.name} [數量: ${i.qty}]`).join('<br>')}
                        </td></tr>
                    </table>
                    <div class="sign-section">
                        <div class="sign-box">物流/司機簽章:</div>
                        <div class="sign-box">主管/會計核章:</div>
                    </div>
                </div>
            `).join('');

            // 確保內容填入後再觸發列印
            setTimeout(() => {
                window.print();
            }, 500);
        };

        window.navigate = (view, role = null) => {
            state.view = view;
            if (role) state.role = role;
            render();
        };

        window.updateStatus = async (id, newStatus) => {
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', id);
                await updateDoc(docRef, { status: newStatus });
                await fetchData();
            } catch (err) {
                console.error(err);
            }
        };

        window.submitTask = async (e) => {
            e.preventDefault();
            const items = Array.from(document.querySelectorAll('.item-row')).map(row => ({
                name: row.querySelector('.i-name').value,
                qty: row.querySelector('.i-qty').value
            })).filter(i => i.name && i.qty);

            const data = {
                type: document.getElementById('o-type').value,
                target: document.getElementById('o-target').value,
                items,
                status: '待執行',
                createdAt: new Date().toLocaleString(),
                timestamp: Date.now()
            };

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), data);
                await fetchData();
                state.view = 'dashboard';
                render();
            } catch (err) {
                console.error(err);
            }
        };

        window.addMoreItem = () => {
            const container = document.getElementById('items-list');
            const div = document.createElement('div');
            div.className = "flex gap-2 item-row mt-2";
            div.innerHTML = `
                <input placeholder="品項名稱" class="i-name flex-grow p-4 bg-gray-100 rounded-xl border-none">
                <input placeholder="量" class="i-qty w-20 p-4 bg-gray-100 rounded-xl border-none">
            `;
            container.appendChild(div);
        };

        // --- 介面渲染 ---
        function render() {
            const root = document.getElementById('app');
            if (!state.isInited) return;

            if (state.role === 'portal') {
                root.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-6 text-center">
                        <h1 class="text-5xl font-black mb-2 italic tracking-tighter">EDM SYSTEM</h1>
                        <p class="text-orange-500 font-bold mb-16 tracking-widest text-sm uppercase">Dispatch & Logistics Management</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl">
                            ${[
                                { id: 'admin', label: '管理中心', icon: 'fa-user-shield', color: 'text-red-500' },
                                { id: 'purchase', label: '採購部門', icon: 'fa-shopping-cart', color: 'text-blue-500' },
                                { id: 'logistics', label: '廠務運輸', icon: 'fa-truck', color: 'text-orange-500' },
                                { id: 'warehouse', label: '資材倉儲', icon: 'fa-warehouse', color: 'text-green-500' }
                            ].map(r => `
                                <div onclick="navigate('dashboard', '${r.id}')" class="bg-white text-slate-900 p-10 rounded-[2rem] shadow-2xl cursor-pointer hover:-translate-y-2 transition-all">
                                    <div class="mb-6"><i class="fas ${r.icon} text-4xl ${r.color}"></i></div>
                                    <div class="text-2xl font-black">${r.label}</div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                return;
            }

            const header = `
                <header class="no-print p-4 bg-slate-900 border-b border-slate-800 flex justify-between items-center sticky top-0 z-50">
                    <div class="flex items-center gap-3 cursor-pointer" onclick="navigate('dashboard', 'portal')">
                        <i class="fas fa-chevron-left text-xs"></i>
                        <span class="font-bold tracking-tighter">${state.role.toUpperCase()} PORTAL</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <i onclick="fetchData()" class="fas fa-sync-alt cursor-pointer ${state.isSyncing ? 'sync-rotate text-orange-500' : ''}"></i>
                        <button onclick="handlePrint()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-1.5 rounded-lg text-sm font-bold">批量列印</button>
                        ${state.role === 'purchase' ? `<button onclick="navigate('new')" class="bg-orange-500 text-black px-4 py-1.5 rounded-lg text-sm font-bold">建立單據</button>` : ''}
                        <button onclick="navigate('dashboard')" class="text-sm text-gray-400 hover:text-white font-bold">看板</button>
                    </div>
                </header>
            `;

            if (state.view === 'new') {
                root.innerHTML = header + `
                    <div class="p-8 max-w-xl mx-auto bg-white text-slate-900 rounded-[2.5rem] mt-10 shadow-2xl no-print">
                        <h2 class="text-2xl font-black mb-8">建立配送任務</h2>
                        <form onsubmit="submitTask(event)">
                            <div class="mb-6">
                                <label class="text-[10px] font-black text-gray-400 uppercase block mb-1">任務類別</label>
                                <select id="o-type" class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-none font-bold">
                                    <option>加工件 (需載回)</option>
                                    <option>備品銷售 (直送)</option>
                                </select>
                            </div>
                            <div class="mb-6">
                                <label class="text-[10px] font-black text-gray-400 uppercase block mb-1">目標客戶/廠商</label>
                                <input id="o-target" placeholder="請輸入名稱" required class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-none font-bold">
                            </div>
                            <div id="items-list" class="mb-2">
                                <label class="text-[10px] font-black text-gray-400 uppercase block mb-1">品項明細</label>
                                <div class="flex gap-2 item-row">
                                    <input placeholder="品項名稱" class="i-name flex-grow p-4 bg-gray-100 rounded-2xl border-none font-bold" required>
                                    <input placeholder="量" class="i-qty w-24 p-4 bg-gray-100 rounded-2xl border-none font-bold" required>
                                </div>
                            </div>
                            <button type="button" onclick="addMoreItem()" class="text-blue-600 text-xs font-bold mb-8">+ 增加品項</button>
                            <button type="submit" class="w-full py-5 bg-slate-900 text-white font-black rounded-3xl shadow-lg hover:bg-black transition-all">確認存檔並發布至看板</button>
                        </form>
                    </div>
                `;
            } else {
                root.innerHTML = header + `
                    <div class="p-6 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto no-print">
                        ${state.orders.length > 0 ? state.orders.map(o => `
                            <div class="card-bg p-6 rounded-[2rem] border border-slate-800 relative flex flex-col shadow-xl">
                                <div class="absolute top-6 right-6 flex gap-4 text-slate-500">
                                    <i onclick="handlePrint('${o.id}')" class="fas fa-print cursor-pointer hover:text-white transition-colors"></i>
                                    ${state.role === 'admin' ? `<i onclick="handleDelete('${o.id}')" class="fas fa-trash-alt cursor-pointer hover:text-red-500 transition-colors"></i>` : ''}
                                </div>
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[9px] font-mono text-slate-500">ID: #${o.id.slice(-6).toUpperCase()}</span>
                                    <span class="px-3 py-1 rounded-full text-[10px] font-black ${o.status === '待執行' ? 'bg-red-500 text-white' : o.status === '結案' ? 'bg-green-500 text-white' : 'bg-blue-500 text-white'}">${o.status}</span>
                                </div>
                                <h3 class="text-2xl font-black mb-1 pr-12 leading-tight">${o.target}</h3>
                                <p class="text-[10px] text-orange-500 font-bold mb-6 tracking-widest uppercase">${o.type}</p>
                                <div class="bg-slate-800/50 p-5 rounded-2xl mb-8 flex-grow border border-slate-700/30">
                                    ${o.items.map(i => `<div class="flex justify-between text-sm mb-1"><span>${i.name}</span><b class="text-orange-400">${i.qty}</b></div>`).join('')}
                                </div>
                                ${renderAction(o)}
                            </div>
                        `).join('') : `
                            <div class="col-span-full py-40 text-center opacity-20">
                                <i class="fas fa-box-open text-6xl mb-4"></i>
                                <p class="text-2xl font-black italic uppercase">Database Empty</p>
                            </div>
                        `}
                    </div>
                `;
            }
        }

        function renderAction(o) {
            if (o.status === '結案') return `<div class="text-center text-[10px] text-slate-600 font-bold italic">任務已完成於 ${o.createdAt}</div>`;
            const r = state.role;
            let act = null;

            if (r === 'logistics' && o.status === '待執行') act = { l: "確認送達目的地", s: o.type.includes('需載回') ? '加工中' : '結案', c: 'bg-blue-600' };
            else if (r === 'purchase' && o.status === '加工中') act = { l: "通知載回廠區", s: '待載回', c: 'bg-orange-600' };
            else if (r === 'logistics' && o.status === '待載回') act = { l: "司機回程中", s: '待入庫', c: 'bg-indigo-600' };
            else if (r === 'warehouse' && o.status === '待入庫') act = { l: "核點入庫完成", s: '結案', c: 'bg-green-600' };

            if (act) return `<button onclick="updateStatus('${o.id}', '${act.s}')" class="w-full py-4 ${act.c} text-white font-black rounded-2xl shadow-lg active:scale-95 transition-all">${act.l}</button>`;
            return `<div class="text-center text-[10px] text-slate-700 font-bold italic">等待相關單位處理中...</div>`;
        }

        // 啟動應用程式
        bootstrap();
    </script>
</body>
</html>
