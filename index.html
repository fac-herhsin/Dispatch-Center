<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業內部調度與物流管理系統</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root { --primary-color: #2c3e50; }
        body { background-color: #f8f9fa; }
        .sidebar { background: var(--primary-color); min-height: 100vh; color: white; }
        .nav-link { color: rgba(255,255,255,0.8); }
        .nav-link.active { color: white; font-weight: bold; background: rgba(255,255,255,0.1); }
        .status-badge { font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container-fluid">
    <div class="row">
        <nav class="col-md-2 d-none d-md-block sidebar p-3">
            <h4 class="mb-4">調度系統 v1.0</h4>
            <ul class="nav flex-column">
                <li class="nav-item"><a href="#" class="nav-link active" onclick="showSection('factory')">工廠加工進度</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('procurement')">採購與物料</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('warehouse')">倉庫與庫存</a></li>
                <li class="nav-item"><a href="#" class="nav-link" onclick="showSection('transport')">銷售運輸追蹤</a></li>
            </ul>
        </nav>

        <main class="col-md-10 ms-sm-auto px-md-4 py-4">
            <div id="factory-section" class="content-section">
                <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
                    <h2>工廠加工進度追蹤</h2>
                    <button class="btn btn-primary" onclick="addOrder()">新增加工單</button>
                </div>
                
                <div class="table-responsive">
                    <table class="table table-striped table-hover">
                        <thead class="table-dark">
                            <tr>
                                <th>單號</th>
                                <th>品項名稱</th>
                                <th>加工階段</th>
                                <th>進度</th>
                                <th>負責人</th>
                                <th>預計完工</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody id="order-list">
                            <tr>
                                <td>#WP-20260301</td>
                                <td>焊接結構組件</td>
                                <td><span class="badge bg-warning text-dark">品質檢驗中</span></td>
                                <td>
                                    <div class="progress" style="height: 10px;">
                                        <div class="progress-bar" style="width: 75%"></div>
                                    </div>
                                </td>
                                <td>王大明</td>
                                <td>2026-03-12</td>
                                <td><button class="btn btn-sm btn-outline-secondary">更新</button></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
            
            </main>
    </div>
</div>

<script type="module">
  // 這裡之後可以貼上你的 Firebase Config
  // import { initializeApp } from "https://www.gstatic.com/firebasejs/9.x.x/firebase-app.js";
</script>

<script>
    function showSection(sectionId) {
        // 切換顯示邏輯
        console.log("切換至: " + sectionId);
        // 你可以在這裡用 JavaScript 切換不同的 table 資料
    }

    function addOrder() {
        alert("這將觸發新增表單，並將資料 push 到 Firebase");
    }
</script>

</body>
</html>
