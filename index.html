<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業內部調度管理系統 - 專業版</title>
    <!-- 使用 Tailwind CSS 進行快速 UI 佈局 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide 圖示庫 -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f3f4f6; }
        .sidebar-item:hover { background-color: rgba(255, 255, 255, 0.1); }
        .active-tab { background-color: #3b82f6; color: white; }
        
        /* 載入動畫樣式 */
        #loader-overlay {
            position: fixed;
            inset: 0;
            background: #1a202c;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid #2d3748;
            border-top: 5px solid #ed8936;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <!-- 載入畫面 (對應你截圖中的狀況) -->
    <div id="loader-overlay">
        <div class="spinner mb-4"></div>
        <div class="text-orange-500 text-lg tracking-widest font-bold">系統連線中...</div>
        <div class="text-gray-400 text-sm mt-2">正在初始化雲端資料庫</div>
    </div>

    <div class="flex h-screen overflow-hidden">
        <!-- 側邊欄 -->
        <aside class="w-64 bg-slate-900 text-white flex flex-shrink-0 flex-col">
            <div class="p-6 text-2xl font-bold border-b border-slate-700 flex items-center">
                <i data-lucide="layers" class="mr-2 text-blue-400"></i>
                調度中心
            </div>
            <nav class="flex-1 p-4 space-y-2 overflow-y-auto">
                <button onclick="switchTab('factory')" id="btn-factory" class="sidebar-item w-full flex items-center p-3 rounded-lg transition active-tab">
                    <i data-lucide="factory" class="mr-3 w-5 h-5"></i> 工廠加工進度
                </button>
                <button onclick="switchTab('procure')" id="btn-procure" class="sidebar-item w-full flex items-center p-3 rounded-lg transition">
                    <i data-lucide="shopping-cart" class="mr-3 w-5 h-5"></i> 採購與物料
                </button>
                <button onclick="switchTab('warehouse')" id="btn-warehouse" class="sidebar-item w-full flex items-center p-3 rounded-lg transition">
                    <i data-lucide="warehouse" class="mr-3 w-5 h-5"></i> 倉庫與庫存
                </button>
                <button onclick="switchTab('shipping')" id="btn-shipping" class="sidebar-item w-full flex items-center p-3 rounded-lg transition">
                    <i data-lucide="truck" class="mr-3 w-5 h-5"></i> 銷售運輸追蹤
                </button>
            </nav>
            <div class="p-4 border-t border-slate-700 bg-slate-800">
                <div class="flex items-center text-sm">
                    <div class="w-2 h-2 bg-green-500 rounded-full mr-2"></div>
                    連線狀態: 已連線
                </div>
            </div>
        </aside>

        <!-- 主內容區 -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- 頂部導航 -->
            <header class="bg-white shadow-sm px-8 py-4 flex justify-between items-center">
                <h2 id="page-title" class="text-xl font-bold text-gray-800">工廠加工進度</h2>
                <div class="flex items-center space-x-4">
                    <button class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm flex items-center transition" onclick="openModal()">
                        <i data-lucide="plus" class="w-4 h-4 mr-1"></i> 新增加工單
                    </button>
                </div>
            </header>

            <!-- 資料展示區 -->
            <section id="content-area" class="p-8 overflow-y-auto">
                <div class="bg-white rounded-xl shadow-sm border border-gray-200">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 border-b border-gray-200 text-gray-600 text-sm uppercase">
                                <th class="p-4 font-semibold">單號</th>
                                <th class="p-4 font-semibold">品項名稱</th>
                                <th class="p-4 font-semibold">當前階段</th>
                                <th class="p-4 font-semibold">進度</th>
                                <th class="p-4 font-semibold">負責人</th>
                                <th class="p-4 font-semibold">預計交期</th>
                                <th class="p-4 font-semibold">操作</th>
                            </tr>
                        </thead>
                        <tbody id="table-body" class="text-gray-700">
                            <!-- JS 動態渲染 -->
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <!-- 簡易 Modal (新增表單) -->
    <div id="modal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl max-w-md w-full p-6 shadow-2xl">
            <h3 class="text-lg font-bold mb-4">建立新調度任務</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">品項名稱</label>
                    <input type="text" id="input-item" class="w-full mt-1 p-2 border border-gray-300 rounded-md outline-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">負責人</label>
                        <input type="text" id="input-owner" class="w-full mt-1 p-2 border border-gray-300 rounded-md">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">類別</label>
                        <select id="input-category" class="w-full mt-1 p-2 border border-gray-300 rounded-md">
                            <option>加工中</option>
                            <option>採購中</option>
                            <option>待出貨</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="mt-6 flex justify-end space-x-3">
                <button onclick="closeModal()" class="px-4 py-2 text-gray-600 hover:bg-gray-100 rounded-md">取消</button>
                <button onclick="saveData()" class="px-4 py-2 bg-blue-600 text-white rounded-md hover:bg-blue-700">儲存任務</button>
            </div>
        </div>
    </div>

    <script>
        // 初始模擬資料
        let currentData = [
            { id: 'JOB-001', name: '精密焊接模組', stage: '品質檢驗', progress: 75, owner: '王大明', date: '2026-03-15', status: 'warning' },
            { id: 'JOB-002', name: '鋁合金外殼', stage: 'CNC加工', progress: 40, owner: '李小華', date: '2026-03-18', status: 'primary' },
            { id: 'JOB-003', name: '控制電路板', stage: 'SMT組裝', progress: 95, owner: '張專員', date: '2026-03-12', status: 'success' }
        ];

        // 初始化頁面
        window.onload = function() {
            lucide.createIcons();
            
            // 模擬連線成功後隱藏載入畫面 (這解決了你圖片中的問題)
            setTimeout(() => {
                const loader = document.getElementById('loader-overlay');
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 500);
            }, 1500);

            renderTable();
        };

        function renderTable() {
            const tbody = document.getElementById('table-body');
            tbody.innerHTML = currentData.map(row => `
                <tr class="border-b border-gray-100 hover:bg-gray-50 transition">
                    <td class="p-4 font-mono text-xs font-bold">${row.id}</td>
                    <td class="p-4 font-medium">${row.name}</td>
                    <td class="p-4">
                        <span class="px-2 py-1 text-xs rounded-full bg-${row.status === 'warning' ? 'orange' : (row.status === 'success' ? 'green' : 'blue')}-100 text-${row.status === 'warning' ? 'orange' : (row.status === 'success' ? 'green' : 'blue')}-700">
                            ${row.stage}
                        </span>
                    </td>
                    <td class="p-4 w-40">
                        <div class="w-full bg-gray-200 rounded-full h-2">
                            <div class="bg-blue-600 h-2 rounded-full" style="width: ${row.progress}%"></div>
                        </div>
                    </td>
                    <td class="p-4 text-sm">${row.owner}</td>
                    <td class="p-4 text-sm text-gray-500">${row.date}</td>
                    <td class="p-4">
                        <button class="text-blue-600 hover:underline text-sm font-medium">更新</button>
                    </td>
                </tr>
            `).join('');
        }

        function switchTab(tab) {
            // 更新 UI 狀態
            const tabs = ['factory', 'procure', 'warehouse', 'shipping'];
            const titles = { 'factory': '工廠加工進度', 'procure': '採購與物料管理', 'warehouse': '庫存與位址管理', 'shipping': '物流運輸監控' };
            
            tabs.forEach(t => {
                const btn = document.getElementById(`btn-${t}`);
                if (t === tab) btn.classList.add('active-tab');
                else btn.classList.remove('active-tab');
            });

            document.getElementById('page-title').innerText = titles[tab];
            // 實際開發時，此處會從 Firebase 抓取不同 collection 的資料
            console.log(`切換資料源至: ${tab}`);
        }

        function openModal() { document.getElementById('modal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('modal').classList.add('hidden'); }

        function saveData() {
            const name = document.getElementById('input-item').value;
            const owner = document.getElementById('input-owner').value;
            if(!name) return alert('請輸入內容');

            const newId = 'JOB-' + Math.floor(Math.random() * 900 + 100);
            currentData.unshift({
                id: newId,
                name: name,
                stage: '待處理',
                progress: 0,
                owner: owner || '未分配',
                date: '未定',
                status: 'primary'
            });

            renderTable();
            closeModal();
            // 此處可加入 Firebase 的 addDoc 邏輯
        }
    </script>
</body>
</html>
