<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業調度管理系統 - 穩定同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }
        .card-bg { background-color: #1e293b; }
        /* 針對截圖中 UI 的樣式還原 */
        .btn-primary { background-color: #1a202c; color: white; border-radius: 1rem; }
        .btn-primary:hover { background-color: #2d3748; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; }
            .print-area { display: block !important; }
        }
        .print-area { display: none; }

        /* 旋轉動畫 */
        .spin-orange {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen">

    <div id="app">
        <!-- 初始載入畫面 -->
        <div id="loading-screen" class="flex flex-col items-center justify-center min-h-screen">
            <div class="spin-orange mb-6"></div>
            <p id="status-msg" class="text-lg font-medium tracking-widest">雲端系統同步中...</p>
            <div id="debug-info" class="mt-4 text-[10px] text-gray-600 font-mono"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. 初始化 Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let state = {
            user: null,
            currentRole: 'portal',
            orders: [],
            view: 'dashboard',
            isSyncing: false
        };

        let unsubscribeOrders = null;

        // 2. 認證流程 (遵循 Rule 3)
        async function startAuth() {
            try {
                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        state.user = user;
                        document.getElementById('debug-info').innerText = `Auth ID: ${user.uid}`;
                        setupRealtimeSync();
                    } else {
                        // 如果沒有 user，嘗試登入
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token).catch(e => console.error(e));
                        } else {
                            await signInAnonymously(auth).catch(e => console.error(e));
                        }
                    }
                });
            } catch (err) {
                document.getElementById('status-msg').innerText = "連線失敗，請檢查權限設定";
                console.error("Auth Error:", err);
            }
        }

        // 3. 資料同步 (遵循 Rule 1 & 2)
        function setupRealtimeSync() {
            if (!state.user || state.isSyncing) return;
            state.isSyncing = true;

            // 嚴格遵循路徑規則: /artifacts/{appId}/public/data/orders
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');

            if (unsubscribeOrders) unsubscribeOrders();

            unsubscribeOrders = onSnapshot(colRef, (snapshot) => {
                const orders = [];
                snapshot.forEach(doc => orders.push({ id: doc.id, ...doc.data() }));
                state.orders = orders;
                render();
            }, (error) => {
                state.isSyncing = false;
                console.error("Sync Error:", error);
                if (error.code === 'permission-denied') {
                    document.getElementById('status-msg').innerText = "權限不足，正在重新嘗試認證...";
                    // 權限失敗時嘗試重新登入
                    signInAnonymously(auth);
                }
            });
        }

        // --- 核心操作 ---
        window.changeRole = (role) => {
            state.currentRole = role;
            state.view = 'dashboard';
            render();
        };

        window.setView = (view) => {
            state.view = view;
            render();
        };

        window.submitOrder = async (e) => {
            e.preventDefault();
            if (!state.user) return;

            const items = Array.from(document.querySelectorAll('.item-row')).map(row => ({
                name: row.querySelector('.i-name').value,
                qty: row.querySelector('.i-qty').value,
                unit: '件'
            }));

            const data = {
                type: document.getElementById('o-type').value,
                target: document.getElementById('o-target').value,
                items,
                status: '待執行',
                createdAt: new Date().toLocaleString(),
                timestamp: Date.now()
            };

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                await addDoc(colRef, data);
                state.view = 'dashboard';
                render();
            } catch (err) {
                console.error("Add Doc Error:", err);
            }
        };

        window.updateStatus = async (id, status) => {
            if (!state.user) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', id);
            await updateDoc(docRef, { status });
        };

        window.addInputRow = () => {
            const container = document.getElementById('items-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 item-row mt-2";
            div.innerHTML = `<input placeholder="品項" class="i-name flex-grow p-4 bg-gray-100 rounded-2xl border-none outline-none"><input placeholder="量" class="i-qty w-24 p-4 bg-gray-100 rounded-2xl border-none outline-none">`;
            container.appendChild(div);
        };

        // --- UI 渲染 ---
        function render() {
            const app = document.getElementById('app');
            
            // 頂部導航
            const navbar = (state.currentRole === 'portal') ? '' : `
                <nav class="no-print flex items-center justify-between px-6 py-4 bg-slate-900 border-b border-gray-800">
                    <div class="flex items-center gap-2 cursor-pointer" onclick="changeRole('portal')">
                        <span class="text-xl font-bold">調度系統</span>
                        <span class="bg-orange-500 text-black text-[10px] px-2 py-0.5 rounded font-black">
                            ${state.currentRole === 'admin' ? '管理' : state.currentRole === 'purchase' ? '採購' : state.currentRole === 'logistics' ? '廠務' : '倉管'}
                        </span>
                    </div>
                    <div class="flex items-center gap-6 text-sm font-bold">
                        <button onclick="setView('dashboard')" class="${state.view === 'dashboard' ? 'text-orange-400' : 'text-gray-400'}">看板</button>
                        ${state.currentRole === 'purchase' ? `<button onclick="setView('newTask')" class="bg-orange-500 text-black px-4 py-1.5 rounded-lg">新增單據</button>` : ''}
                        <button onclick="changeRole('portal')" class="text-gray-500">登出</button>
                    </div>
                </nav>
            `;

            if (state.currentRole === 'portal') {
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-6">
                        <h1 class="text-4xl font-bold mb-2">企業調度管理系統</h1>
                        <p class="text-orange-500 font-bold mb-12">雲端連線成功，請選擇部門</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl">
                            ${[
                                { id: 'admin', name: '管理員', icon: 'fa-user-shield' },
                                { id: 'purchase', name: '採購部', icon: 'fa-shopping-cart' },
                                { id: 'logistics', name: '廠務部', icon: 'fa-truck' },
                                { id: 'warehouse', name: '倉管部', icon: 'fa-warehouse' }
                            ].map(r => `
                                <div onclick="changeRole('${r.id}')" class="bg-white text-slate-900 p-8 rounded-3xl flex flex-col items-center shadow-xl cursor-pointer hover:scale-105 transition">
                                    <i class="fas ${r.icon} text-3xl mb-4 text-blue-500"></i>
                                    <span class="text-xl font-black">${r.name}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'newTask') {
                app.innerHTML = navbar + `
                    <div class="max-w-xl mx-auto mt-10 p-8 bg-white rounded-3xl text-slate-900 shadow-2xl">
                        <h2 class="text-2xl font-black mb-8">新增調度任務</h2>
                        <form onsubmit="submitOrder(event)">
                            <div class="mb-4">
                                <select id="o-type" class="w-full p-4 bg-gray-100 rounded-2xl border-none font-bold">
                                    <option value="加工件 (需載回)">加工件 (需載回)</option>
                                    <option value="備品銷售 (直送)">備品銷售 (直送)</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <input id="o-target" placeholder="對象名稱" required class="w-full p-4 bg-gray-100 rounded-2xl border-none outline-none font-bold">
                            </div>
                            <div id="items-container">
                                <div class="flex gap-2 item-row">
                                    <input placeholder="品項" class="i-name flex-grow p-4 bg-gray-100 rounded-2xl border-none outline-none" required>
                                    <input placeholder="量" class="i-qty w-24 p-4 bg-gray-100 rounded-2xl border-none outline-none" required>
                                </div>
                            </div>
                            <button type="button" onclick="addInputRow()" class="text-blue-600 font-bold text-sm mt-3 mb-6">+ 增加品項</button>
                            <button type="submit" class="w-full py-5 btn-primary font-black text-lg">送出並儲存</button>
                        </form>
                    </div>
                `;
            } else {
                const sorted = [...state.orders].sort((a,b) => (b.timestamp || 0) - (a.timestamp || 0));
                app.innerHTML = navbar + `
                    <div class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${sorted.map(o => `
                            <div class="card-bg p-6 rounded-2xl shadow-lg border border-gray-800 flex flex-col">
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[10px] font-mono text-gray-500">${o.id.substring(0,6)}</span>
                                    <span class="status-tag ${o.status === '待執行' ? 'bg-red-500' : o.status === '結案' ? 'bg-green-600' : 'bg-blue-500'}">${o.status}</span>
                                </div>
                                <h3 class="text-xl font-bold mb-1">${o.target}</h3>
                                <p class="text-xs text-orange-400 font-bold mb-4">${o.type}</p>
                                <div class="bg-slate-800/50 p-4 rounded-xl space-y-2 mb-6 flex-grow">
                                    ${o.items.map(i => `<div class="flex justify-between text-sm"><span>${i.name}</span><span class="font-bold text-orange-200">${i.qty}</span></div>`).join('')}
                                </div>
                                ${renderActionBtn(o)}
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        function renderActionBtn(o) {
            if (state.currentRole === 'logistics' && o.status === '待執行') {
                return `<button onclick="updateStatus('${o.id}', '${o.type.includes('需載回') ? '加工中' : '結案'}')" class="w-full py-3 bg-blue-600 rounded-xl font-bold">回報已送達</button>`;
            }
            if (state.currentRole === 'purchase' && o.status === '加工中') {
                return `<button onclick="updateStatus('${o.id}', '待載回')" class="w-full py-3 bg-orange-600 rounded-xl font-bold">通知載回</button>`;
            }
            if (state.currentRole === 'logistics' && o.status === '待載回') {
                return `<button onclick="updateStatus('${o.id}', '待入庫')" class="w-full py-3 bg-indigo-600 rounded-xl font-bold">司機已載回</button>`;
            }
            if (state.currentRole === 'warehouse' && o.status === '待入庫') {
                return `<button onclick="updateStatus('${o.id}', '結案')" class="w-full py-3 bg-green-600 rounded-xl font-bold">確認入庫</button>`;
            }
            return `<div class="text-[10px] text-gray-600 text-center italic">建立時間: ${o.createdAt}</div>`;
        }

        // 啟動
        startAuth();
    </script>
</body>
</html>
