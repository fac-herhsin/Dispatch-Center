<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業調度管理系統 - 手動同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Microsoft JhengHei", "PingFang TC", sans-serif;
        }
        .card-bg { background-color: #1e293b; }
        .btn-primary { background-color: #1a202c; color: white; border-radius: 1rem; }
        .btn-primary:hover { background-color: #2d3748; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
        
        /* 列印相關設定 */
        @media print {
            .no-print { display: none !important; }
            body { background: white !important; color: black !important; padding: 0 !important; }
            .print-area { display: block !important; width: 100% !important; }
            table { width: 100% !important; border-collapse: collapse !important; margin-top: 20px; }
            th, td { border: 1px solid black !important; padding: 10px !important; color: black !important; text-align: left; }
            .print-header { text-align: center; margin-bottom: 20px; }
            .print-footer { margin-top: 30px; display: grid; grid-template-cols: 1fr 1fr; gap: 20px; }
            .page-break { page-break-after: always; }
        }
        .print-area { display: none; }

        .spin-orange {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #f97316;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .sync-rotate { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen">

    <div id="app">
        <!-- 初始載入畫面 -->
        <div id="loading-screen" class="flex flex-col items-center justify-center min-h-screen">
            <div class="spin-orange mb-6"></div>
            <p id="status-msg" class="text-lg font-medium tracking-widest">系統啟動中...</p>
            <div id="debug-info" class="mt-4 text-[10px] text-gray-600 font-mono"></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // 1. 初始化 Firebase
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let state = {
            user: null,
            currentRole: 'portal',
            orders: [],
            view: 'dashboard',
            isRefreshing: false,
            hasLoadedOnce: false,
            printList: [] // 儲存當前要列印的清單
        };

        // 2. 認證流程
        async function startAuth() {
            onAuthStateChanged(auth, async (user) => {
                if (user) {
                    state.user = user;
                    if (!state.hasLoadedOnce) {
                        await manualSync();
                        state.hasLoadedOnce = true;
                    }
                    render();
                } else {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await signInWithCustomToken(auth, __initial_auth_token).catch(e => console.error(e));
                    } else {
                        await signInAnonymously(auth).catch(e => console.error(e));
                    }
                }
            });
        }

        // 3. 手動雲端同步功能
        window.manualSync = async () => {
            if (!state.user || state.isRefreshing) return;
            state.isRefreshing = true;
            render();

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                const querySnapshot = await getDocs(colRef);
                const orders = [];
                querySnapshot.forEach((doc) => {
                    orders.push({ id: doc.id, ...doc.data() });
                });
                state.orders = orders.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            } catch (error) {
                console.error("Sync Error:", error);
            } finally {
                state.isRefreshing = false;
                render();
            }
        };

        // --- 列印功能 ---
        window.handlePrint = (type, orderId = null) => {
            if (type === 'batch') {
                // 批量列印：選取所有「未結案」的單據
                state.printList = state.orders.filter(o => o.status !== '結案');
            } else if (type === 'single' && orderId) {
                // 單張列印
                const target = state.orders.find(o => o.id === orderId);
                state.printList = target ? [target] : [];
            }
            
            if (state.printList.length === 0) {
                alert("目前沒有可列印的內容");
                return;
            }

            render(); // 更新渲染以顯示隱藏的列印區域
            setTimeout(() => {
                window.print();
            }, 500);
        };

        // --- 核心操作 ---
        window.changeRole = (role) => {
            state.currentRole = role;
            state.view = 'dashboard';
            render();
        };

        window.setView = (view) => {
            state.view = view;
            render();
        };

        window.submitOrder = async (e) => {
            e.preventDefault();
            if (!state.user) return;

            const items = Array.from(document.querySelectorAll('.item-row')).map(row => ({
                name: row.querySelector('.i-name').value,
                qty: row.querySelector('.i-qty').value,
                unit: '件'
            }));

            const data = {
                type: document.getElementById('o-type').value,
                target: document.getElementById('o-target').value,
                items,
                status: '待執行',
                createdAt: new Date().toLocaleString(),
                timestamp: Date.now()
            };

            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                await addDoc(colRef, data);
                await manualSync();
                state.view = 'dashboard';
                render();
            } catch (err) {
                console.error("Add Doc Error:", err);
            }
        };

        window.updateStatus = async (id, status) => {
            if (!state.user) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', id);
                await updateDoc(docRef, { status });
                await manualSync();
            } catch (err) {
                console.error("Update Error:", err);
            }
        };

        window.addInputRow = () => {
            const container = document.getElementById('items-container');
            const div = document.createElement('div');
            div.className = "flex gap-2 item-row mt-2";
            div.innerHTML = `<input placeholder="品項名稱" class="i-name flex-grow p-4 bg-gray-100 rounded-2xl border-none outline-none"><input placeholder="數量" class="i-qty w-24 p-4 bg-gray-100 rounded-2xl border-none outline-none">`;
            container.appendChild(div);
        };

        // --- UI 渲染 ---
        function render() {
            const app = document.getElementById('app');
            if (!state.user && !state.hasLoadedOnce) return;

            // 頂部導航
            const navbar = (state.currentRole === 'portal') ? '' : `
                <nav class="no-print flex items-center justify-between px-6 py-4 bg-slate-900 border-b border-gray-800 sticky top-0 z-50">
                    <div class="flex items-center gap-2 cursor-pointer" onclick="changeRole('portal')">
                        <span class="text-xl font-bold">調度系統</span>
                        <span class="bg-orange-500 text-black text-[10px] px-2 py-0.5 rounded font-black">
                            ${state.currentRole === 'admin' ? '管理' : state.currentRole === 'purchase' ? '採購' : state.currentRole === 'logistics' ? '廠務' : '倉管'}
                        </span>
                    </div>
                    <div class="flex items-center gap-3 text-sm font-bold">
                        <!-- 雲端同步 -->
                        <button onclick="manualSync()" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-orange-400 transition-colors">
                            <i class="fas fa-sync-alt ${state.isRefreshing ? 'sync-rotate' : ''}"></i>
                            ${state.isRefreshing ? '同步中' : '同步'}
                        </button>
                        
                        <!-- 批量列印 -->
                        <button onclick="handlePrint('batch')" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-1.5 rounded-lg text-white">
                            <i class="fas fa-print"></i> 批量列印
                        </button>

                        <div class="h-6 w-[1px] bg-gray-700 mx-1"></div>

                        <button onclick="setView('dashboard')" class="${state.view === 'dashboard' ? 'text-white' : 'text-gray-400'}">看板</button>
                        ${state.currentRole === 'purchase' ? `<button onclick="setView('newTask')" class="bg-orange-500 text-black px-4 py-1.5 rounded-lg hover:bg-orange-400">新增</button>` : ''}
                        <button onclick="changeRole('portal')" class="text-gray-500 hover:text-white">登出</button>
                    </div>
                </nav>
            `;

            if (state.currentRole === 'portal') {
                app.innerHTML = `
                    <div class="min-h-screen flex flex-col items-center justify-center p-6 no-print">
                        <h1 class="text-4xl font-bold mb-2">企業調度管理系統</h1>
                        <p class="text-orange-500 font-bold mb-12 uppercase text-sm tracking-widest">Enterprise Dispatch System</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl">
                            ${['admin', 'purchase', 'logistics', 'warehouse'].map(id => `
                                <div onclick="changeRole('${id}')" class="bg-white text-slate-900 p-8 rounded-3xl flex flex-col items-center shadow-xl cursor-pointer hover:scale-105 transition duration-300">
                                    <div class="w-16 h-16 bg-slate-100 rounded-2xl flex items-center justify-center mb-4">
                                        <i class="fas ${id==='admin'?'fa-user-shield':id==='purchase'?'fa-shopping-cart':id==='logistics'?'fa-truck':'fa-warehouse'} text-2xl text-blue-600"></i>
                                    </div>
                                    <span class="text-xl font-black">${id==='admin'?'管理員':id==='purchase'?'採購部':id==='logistics'?'廠務部':'倉管部'}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (state.view === 'newTask') {
                app.innerHTML = navbar + `
                    <div class="max-w-xl mx-auto mt-10 p-8 bg-white rounded-3xl text-slate-900 shadow-2xl no-print">
                        <h2 class="text-2xl font-black mb-8"><i class="fas fa-plus-circle text-orange-500"></i> 新增調度任務</h2>
                        <form onsubmit="submitOrder(event)">
                            <div class="mb-4">
                                <label class="block text-xs font-bold text-gray-400 mb-2">任務類別</label>
                                <select id="o-type" class="w-full p-4 bg-gray-100 rounded-2xl border-none font-bold outline-none">
                                    <option value="加工件 (需載回)">加工件 (需載回)</option>
                                    <option value="備品銷售 (直送)">備品銷售 (直送)</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="block text-xs font-bold text-gray-400 mb-2">對象名稱</label>
                                <input id="o-target" placeholder="例如：某某加工廠" required class="w-full p-4 bg-gray-100 rounded-2xl border-none font-bold outline-none">
                            </div>
                            <div id="items-container">
                                <label class="block text-xs font-bold text-gray-400 mb-2">品項與數量</label>
                                <div class="flex gap-2 item-row">
                                    <input placeholder="品項名稱" class="i-name flex-grow p-4 bg-gray-100 rounded-2xl border-none outline-none" required>
                                    <input placeholder="數量" class="i-qty w-24 p-4 bg-gray-100 rounded-2xl border-none outline-none" required>
                                </div>
                            </div>
                            <button type="button" onclick="addInputRow()" class="text-blue-600 font-bold text-sm mt-3 mb-6 hover:text-blue-800">+ 增加品項</button>
                            <button type="submit" class="w-full py-5 btn-primary font-black text-lg shadow-lg">送出並儲存</button>
                        </form>
                    </div>
                `;
            } else {
                app.innerHTML = navbar + `
                    <div class="p-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 max-w-7xl mx-auto no-print">
                        ${state.orders.length > 0 ? state.orders.map(o => `
                            <div class="card-bg p-6 rounded-2xl shadow-lg border border-gray-800 flex flex-col relative group">
                                <!-- 單張列印按鈕 -->
                                <button onclick="handlePrint('single', '${o.id}')" class="absolute top-4 right-4 text-gray-600 hover:text-white transition-colors">
                                    <i class="fas fa-print"></i>
                                </button>
                                
                                <div class="flex justify-between items-start mb-4">
                                    <span class="text-[10px] font-mono text-gray-500">#${o.id.substring(0,6).toUpperCase()}</span>
                                    <span class="status-tag ${o.status === '待執行' ? 'bg-red-500' : o.status === '結案' ? 'bg-green-600' : 'bg-blue-500'}">${o.status}</span>
                                </div>
                                <h3 class="text-xl font-bold mb-1">${o.target}</h3>
                                <p class="text-xs text-orange-400 font-bold mb-4">${o.type}</p>
                                <div class="bg-slate-800/50 p-4 rounded-xl space-y-2 mb-6 flex-grow border border-gray-700/50">
                                    ${o.items.map(i => `<div class="flex justify-between text-sm"><span>${i.name}</span><span class="font-bold text-orange-200">${i.qty}</span></div>`).join('')}
                                </div>
                                ${renderActionBtn(o)}
                            </div>
                        `).join('') : '<p class="col-span-full text-center py-20 opacity-40">目前無單據</p>'}
                    </div>
                    <!-- 列印區域 -->
                    <div class="print-area">
                        ${state.printList.map((o, idx) => `
                            <div class="${idx < state.printList.length - 1 ? 'page-break' : ''}">
                                <div class="print-header">
                                    <h1 style="font-size: 24px; font-weight: bold;">企業調度配送單</h1>
                                    <p style="font-size: 12px;">列印時間：${new Date().toLocaleString()}</p>
                                </div>
                                <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                                    <span>單據編號：#${o.id.toUpperCase()}</span>
                                    <span>建立日期：${o.createdAt}</span>
                                </div>
                                <table>
                                    <tr>
                                        <th style="width: 20%;">任務類型</th>
                                        <th style="width: 30%;">對象名稱</th>
                                        <th style="width: 30%;">品項內容</th>
                                        <th style="width: 20%;">目前狀態</th>
                                    </tr>
                                    <tr>
                                        <td>${o.type}</td>
                                        <td><strong>${o.target}</strong></td>
                                        <td>${o.items.map(i => `${i.name} x ${i.qty}`).join('<br>')}</td>
                                        <td>${o.status}</td>
                                    </tr>
                                </table>
                                <div class="print-footer">
                                    <div style="border-bottom: 1px solid black; padding-top: 40px;">司機簽名：</div>
                                    <div style="border-bottom: 1px solid black; padding-top: 40px;">單位主管簽章：</div>
                                </div>
                                <p style="font-size: 10px; margin-top: 20px; color: gray; text-align: center;">-- 系統存根聯 --</p>
                            </div>
                        `).join('')}
                    </div>
                `;
            }
        }

        function renderActionBtn(o) {
            if (o.status === '結案') return `<div class="text-[10px] text-gray-600 text-center italic">結案於: ${o.createdAt}</div>`;
            if (state.currentRole === 'logistics' && o.status === '待執行') return `<button onclick="updateStatus('${o.id}', '${o.type.includes('需載回') ? '加工中' : '結案'}')" class="w-full py-3 bg-blue-600 hover:bg-blue-500 rounded-xl font-bold">回報已送達</button>`;
            if (state.currentRole === 'purchase' && o.status === '加工中') return `<button onclick="updateStatus('${o.id}', '待載回')" class="w-full py-3 bg-orange-600 hover:bg-orange-500 rounded-xl font-bold">通知載回</button>`;
            if (state.currentRole === 'logistics' && o.status === '待載回') return `<button onclick="updateStatus('${o.id}', '待入庫')" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-xl font-bold">司機已載回</button>`;
            if (state.currentRole === 'warehouse' && o.status === '待入庫') return `<button onclick="updateStatus('${o.id}', '結案')" class="w-full py-3 bg-green-600 hover:bg-green-500 rounded-xl font-bold">確認入庫</button>`;
            return `<div class="text-[10px] text-gray-600 text-center italic">建立時間: ${o.createdAt}</div>`;
        }

        startAuth();
    </script>
</body>
</html>
