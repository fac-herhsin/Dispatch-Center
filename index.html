<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業調度管理系統 - 雲端同步版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        .card-bg {
            background-color: #1e293b;
        }
        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
        /* 列印相關設定 */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white !important; color: black !important; padding: 0 !important; }
            .print-area { display: block !important; width: 100% !important; }
            table { width: 100% !important; border-collapse: collapse !important; }
            th, td { border: 1px solid black !important; padding: 8px !important; color: black !important; }
        }
        .print-area { display: none; }
    </style>
</head>
<body class="min-h-screen">

    <div id="app">
        <div class="flex items-center justify-center min-h-screen">
            <div class="text-center">
                <i class="fas fa-spinner fa-spin text-4xl mb-4 text-orange-500"></i>
                <p>雲端系統同步中...</p>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase 設定由環境變數注入
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';

        let state = {
            currentRole: 'portal',
            orders: [],
            view: 'dashboard',
            user: null,
            printMode: 'all', // all, single
            singlePrintTarget: null
        };

        // --- 雲端即時同步 (遵循 Rule 3: 必須在 Auth 之後) ---
        function startSync(user) {
            if (!user) return;
            
            // 建立指向 /artifacts/{appId}/public/data/orders 的路徑 (遵循 Rule 1)
            const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
            
            // 監聽雲端資料變動
            onSnapshot(colRef, (snapshot) => {
                const orders = [];
                snapshot.forEach((doc) => {
                    orders.push({ id: doc.id, ...doc.data() });
                });
                state.orders = orders;
                render();
            }, (error) => {
                console.error("Sync Error", error);
            });
        }

        // --- 初始化身份驗證 (遵循 Rule 3) ---
        async function initApp() {
            try {
                // 1. 先設定認證狀態監聽器
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        state.user = user;
                        // 2. 只有在確認有 user 對象後才啟動同步
                        startSync(user);
                    }
                    render();
                });

                // 3. 嘗試登入 (優先使用 Custom Token)
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Initialization Error", error);
            }
        }

        // --- 資料操作 ---
        window.addOrder = async (orderData) => {
            if (!state.user) return;
            try {
                const colRef = collection(db, 'artifacts', appId, 'public', 'data', 'orders');
                await addDoc(colRef, {
                    ...orderData,
                    status: '待執行',
                    createdAt: new Date().toLocaleString(),
                    timestamp: Date.now()
                });
                state.view = 'dashboard';
                render();
            } catch (e) {
                console.error("Add Order Error", e);
            }
        };

        window.changeStatus = async (docId, newStatus) => {
            if (!state.user) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', docId);
                await updateDoc(docRef, { status: newStatus });
            } catch (e) {
                console.error("Update Status Error", e);
            }
        };

        window.deleteOrder = async (docId) => {
            if (!state.user) return;
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'orders', docId);
                await deleteDoc(docRef);
            } catch (e) {
                console.error("Delete Error", e);
            }
        };

        // --- 列印功能 ---
        window.printAll = () => {
            state.printMode = 'all';
            render();
            setTimeout(() => window.print(), 500);
        };

        window.printSingle = (orderId) => {
            state.printMode = 'single';
            state.singlePrintTarget = state.orders.find(o => o.id === orderId);
            render();
            setTimeout(() => window.print(), 500);
        };

        // --- UI 組件 ---
        function Navbar() {
            const roleLabels = { purchase: '採購部', logistics: '廠務部', warehouse: '倉管部', admin: '管理員' };
            return `
                <nav class="no-print flex items-center justify-between px-8 py-4 border-b border-gray-700 bg-slate-900 sticky top-0 z-10">
                    <div class="flex items-center gap-2 cursor-pointer" onclick="window.updateView({currentRole: 'portal'})">
                        <span class="text-xl font-bold tracking-wider">調度系統</span>
                        <span class="bg-orange-500 text-black text-xs px-2 py-0.5 rounded font-bold">${roleLabels[state.currentRole]}</span>
                    </div>
                    <div class="flex gap-4 items-center">
                        <button onclick="window.updateView({view: 'dashboard'})" class="${state.view === 'dashboard' ? 'text-orange-400 font-bold' : ''}">看板</button>
                        <button onclick="window.printAll()" class="bg-blue-600 text-white px-3 py-1.5 rounded-md text-sm font-bold flex items-center gap-2 hover:bg-blue-500">
                            <i class="fas fa-print"></i> 批量列印
                        </button>
                        ${state.currentRole === 'purchase' ? `<button onclick="window.updateView({view: 'newTask'})" class="bg-orange-500 text-black px-4 py-1.5 rounded-md font-bold hover:bg-orange-400 transition">新增</button>` : ''}
                        <button onclick="window.updateView({currentRole: 'portal'})" class="text-gray-400 hover:text-white"><i class="fas fa-sign-out-alt"></i></button>
                    </div>
                </nav>
            `;
        }

        function OrderCard(order) {
            const statusColors = { '待執行': 'bg-red-500', '加工中': 'bg-yellow-600', '待載回': 'bg-blue-500', '待入庫': 'bg-orange-500', '結案': 'bg-green-600' };
            let actionButtons = '';
            
            if (state.currentRole === 'logistics') {
                if (order.status === '待執行') actionButtons = `<button onclick="changeStatus('${order.id}', '${order.type === '加工品' ? '加工中' : '結案'}')" class="w-full mt-4 bg-blue-600 py-2 rounded-lg font-bold">回報：已送達</button>`;
                else if (order.status === '待載回') actionButtons = `<button onclick="changeStatus('${order.id}', '待入庫')" class="w-full mt-4 bg-orange-600 py-2 rounded-lg font-bold">回報：已載回</button>`;
            } else if (state.currentRole === 'purchase' && order.status === '加工中') {
                actionButtons = `<button onclick="changeStatus('${order.id}', '待載回')" class="w-full mt-4 bg-green-600 py-2 rounded-lg font-bold">確認完工</button>`;
            } else if (state.currentRole === 'warehouse' && order.status === '待入庫') {
                actionButtons = `<button onclick="changeStatus('${order.id}', '結案')" class="w-full mt-4 bg-green-700 py-2 rounded-lg font-bold">確認入庫</button>`;
            } else if (state.currentRole === 'admin') {
                actionButtons = `<button onclick="deleteOrder('${order.id}')" class="w-full mt-4 bg-red-900 py-2 rounded-lg font-bold text-xs opacity-60">刪除單據</button>`;
            }

            return `
                <div class="card-bg p-6 rounded-2xl shadow-xl border border-gray-700 flex flex-col justify-between relative group">
                    <button title="列印此單" onclick="window.printSingle('${order.id}')" class="absolute top-4 right-16 text-gray-500 hover:text-white no-print">
                        <i class="fas fa-print"></i>
                    </button>
                    <div>
                        <div class="flex justify-between items-start mb-4">
                            <span class="text-[10px] text-gray-500 font-mono">${order.id.substring(0, 8)}</span>
                            <span class="${statusColors[order.status]} status-badge font-bold">${order.status}</span>
                        </div>
                        <div class="mb-4">
                            <span class="text-xs text-orange-400 font-bold block mb-1">${order.type}</span>
                            <h3 class="text-xl font-bold">${order.target}</h3>
                        </div>
                        <div class="space-y-2 mb-4 text-sm text-gray-300 bg-slate-800/50 p-3 rounded-xl border border-gray-700">
                            ${order.items.map(i => `<div class="flex justify-between"><span>• ${i.name}</span><span class="text-orange-300">${i.qty} ${i.unit}</span></div>`).join('')}
                        </div>
                    </div>
                    <div>
                        <div class="text-[10px] text-gray-500 border-t border-gray-700 pt-3">建立: ${order.createdAt}</div>
                        ${actionButtons}
                    </div>
                </div>
            `;
        }

        function PrintView() {
            const printOrders = state.printMode === 'all' 
                ? state.orders.filter(o => o.status !== '結案') 
                : (state.singlePrintTarget ? [state.singlePrintTarget] : []);

            return `
                <div class="print-area p-8 text-black bg-white">
                    <h1 class="text-2xl font-bold mb-2 text-center border-b-2 border-black pb-2">企業調度配送清單</h1>
                    <p class="text-right text-sm mb-4">列印日期：${new Date().toLocaleString()}</p>
                    <table class="w-full border-collapse border border-black">
                        <thead>
                            <tr class="bg-gray-100">
                                <th class="border border-black p-2">類別</th>
                                <th class="border border-black p-2">對象</th>
                                <th class="border border-black p-2">品項明細</th>
                                <th class="border border-black p-2">狀態</th>
                                <th class="border border-black p-2 w-32">簽名</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${printOrders.map(o => `
                                <tr>
                                    <td class="border border-black p-2 text-center">${o.type}</td>
                                    <td class="border border-black p-2 font-bold">${o.target}</td>
                                    <td class="border border-black p-2 text-sm">${o.items.map(i => `${i.name}(${i.qty}${i.unit})`).join(', ')}</td>
                                    <td class="border border-black p-2 text-center">${o.status}</td>
                                    <td class="border border-black p-2"></td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                    <div class="mt-8 grid grid-cols-2 text-sm">
                        <p>配送人員簽章：________________</p>
                        <p>核對人員簽章：________________</p>
                    </div>
                </div>
            `;
        }

        // --- 全局控制 ---
        window.updateView = (params) => { state = { ...state, ...params }; render(); };
        window.addItemRow = () => {
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `<input placeholder="品項" class="flex-grow p-3 border rounded-xl bg-gray-50" required><input placeholder="量" class="w-20 p-3 border rounded-xl bg-gray-50" required><input placeholder="單位" class="w-20 p-3 border rounded-xl bg-gray-50" required>`;
            document.getElementById('itemsContainer').appendChild(div);
        };

        window.handleTaskSubmit = async (e) => {
            e.preventDefault();
            const items = Array.from(document.getElementById('itemsContainer').querySelectorAll('div.flex')).map(row => {
                const inputs = row.querySelectorAll('input');
                return { name: inputs[0].value, qty: inputs[1].value, unit: inputs[2].value };
            });
            await window.addOrder({ 
                type: document.getElementById('type').value, 
                target: document.getElementById('target').value, 
                items 
            });
        };

        function render() {
            const app = document.getElementById('app');
            
            // 載入中狀態
            if (!state.user && state.currentRole !== 'portal') {
                app.innerHTML = `
                    <div class="flex items-center justify-center min-h-screen">
                        <div class="text-center">
                            <i class="fas fa-spinner fa-spin text-4xl mb-4 text-orange-500"></i>
                            <p>雲端系統同步中...</p>
                        </div>
                    </div>
                `;
                return;
            }

            if (state.currentRole === 'portal') {
                app.innerHTML = `
                    <div class="flex flex-col items-center justify-center min-h-screen p-4 no-print text-center">
                        <h1 class="text-4xl font-bold mb-2">企業調度管理系統</h1>
                        <p class="text-orange-400 mb-12 font-medium">即時雲端同步平台</p>
                        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl">
                            ${['admin', 'purchase', 'logistics', 'warehouse'].map(r => `
                                <div onclick="window.updateView({currentRole: '${r}', view: 'dashboard'})" class="card-bg border-2 border-transparent hover:border-orange-500 cursor-pointer p-10 rounded-2xl flex flex-col items-center shadow-xl transition-all">
                                    <i class="fas ${r === 'admin' ? 'fa-user-shield' : r === 'purchase' ? 'fa-shopping-cart' : r === 'logistics' ? 'fa-truck' : 'fa-warehouse'} text-4xl mb-4 text-blue-400"></i>
                                    <span class="text-xl font-bold">${r === 'admin' ? '管理員' : r === 'purchase' ? '採購部' : r === 'logistics' ? '廠務部' : '倉管部'}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="mt-8 text-gray-600 text-[10px] font-mono">${state.user ? `Cloud ID: ${state.user.uid}` : 'Connecting...'}</div>
                    </div>
                `;
            } else if (state.view === 'newTask') {
                app.innerHTML = Navbar() + `
                    <div class="max-w-2xl mx-auto mt-12 p-8 bg-white rounded-3xl text-gray-900 shadow-2xl no-print">
                        <h2 class="text-2xl font-bold mb-6">新增調度任務</h2>
                        <form onsubmit="handleTaskSubmit(event)">
                            <div class="mb-4"><label class="block text-sm font-bold mb-1">類別</label><select id="type" class="w-full p-3 border rounded-xl bg-gray-50"><option value="加工品">加工件</option><option value="備品銷售">銷售直送</option></select></div>
                            <div class="mb-4"><label class="block text-sm font-bold mb-1">對象</label><input id="target" required class="w-full p-3 border rounded-xl bg-gray-50"></div>
                            <div id="itemsContainer" class="mb-4 space-y-2"><label class="block text-sm font-bold mb-1">明細</label><div class="flex gap-2"><input placeholder="品項" class="flex-grow p-3 border rounded-xl bg-gray-50" required><input placeholder="量" class="w-20 p-3 border rounded-xl bg-gray-50" required><input placeholder="單位" class="w-20 p-3 border rounded-xl bg-gray-50" required></div></div>
                            <button type="button" onclick="addItemRow()" class="text-blue-600 font-bold text-sm mb-6">+ 增加品項</button>
                            <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold">同步發布至雲端</button>
                        </form>
                    </div>
                `;
            } else {
                const sortedOrders = [...state.orders].sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
                app.innerHTML = Navbar() + `
                    <div class="p-8 max-w-7xl mx-auto no-print">
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                            ${sortedOrders.length === 0 ? '<div class="col-span-full py-20 text-center text-gray-500">尚無調度單據資料</div>' : sortedOrders.map(o => OrderCard(o)).join('')}
                        </div>
                    </div>
                    ${PrintView()}
                `;
            }
        }

        // 啟動
        initApp();
    </script>
</body>
</html>
