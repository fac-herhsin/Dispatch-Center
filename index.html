<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>企業調度管理系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: "Microsoft JhengHei", sans-serif;
        }
        .card-bg {
            background-color: #1e293b;
        }
        .btn-primary {
            background-color: #f59e0b;
            color: #000;
        }
        .btn-primary:hover {
            background-color: #fbbf24;
        }
        .nav-active {
            border-bottom: 2px solid #f59e0b;
        }
        .status-badge {
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
        }
    </style>
</head>
<body class="min-h-screen">

    <div id="app">
        <!-- 頁面內容將由 JavaScript 動態渲染 -->
    </div>

    <script>
        // 初始化資料 (模擬資料庫)
        if (!localStorage.getItem('orders')) {
            localStorage.setItem('orders', JSON.stringify([]));
        }

        let state = {
            currentRole: 'portal', // portal, purchase, logistics, warehouse, admin
            orders: JSON.parse(localStorage.getItem('orders')),
            view: 'dashboard' // dashboard, newTask
        };

        // 更新儲存空間並重新渲染
        function updateState(newState) {
            state = { ...state, ...newState };
            localStorage.setItem('orders', JSON.stringify(state.orders));
            render();
        }

        // --- 功能函數 ---
        
        function addOrder(orderData) {
            const newOrder = {
                id: 'DEL-' + Date.now(),
                ...orderData,
                status: '待執行', // 初始狀態
                createdAt: new Date().toLocaleString()
            };
            const updatedOrders = [...state.orders, newOrder];
            updateState({ orders: updatedOrders, view: 'dashboard' });
        }

        function changeStatus(orderId, newStatus) {
            const updatedOrders = state.orders.map(order => {
                if (order.id === orderId) {
                    return { ...order, status: newStatus };
                }
                return order;
            });
            updateState({ orders: updatedOrders });
        }

        function deleteOrder(orderId) {
            const updatedOrders = state.orders.filter(order => order.id !== orderId);
            updateState({ orders: updatedOrders });
        }

        // --- 視圖組件 ---

        function Navbar() {
            const roleLabels = {
                purchase: '採購部',
                logistics: '廠務部',
                warehouse: '倉管部',
                admin: '管理員'
            };
            return `
                <nav class="flex items-center justify-between px-8 py-4 border-b border-gray-700 bg-slate-900 sticky top-0 z-10">
                    <div class="flex items-center gap-2 cursor-pointer" onclick="updateState({currentRole: 'portal'})">
                        <span class="text-xl font-bold tracking-wider">調度系統</span>
                        <span class="bg-orange-500 text-black text-xs px-2 py-0.5 rounded font-bold">${roleLabels[state.currentRole]}</span>
                    </div>
                    <div class="flex gap-6 items-center">
                        <button onclick="updateState({view: 'dashboard'})" class="${state.view === 'dashboard' ? 'text-orange-400 font-bold' : ''}">看板</button>
                        ${state.currentRole === 'purchase' ? `<button onclick="updateState({view: 'newTask'})" class="bg-orange-500 text-black px-4 py-1.5 rounded-md font-bold hover:bg-orange-400 transition">新增單據</button>` : ''}
                        <button onclick="updateState({currentRole: 'portal'})" class="text-gray-400 hover:text-white">登出</button>
                    </div>
                </nav>
            `;
        }

        function PortalView() {
            return `
                <div class="flex flex-col items-center justify-center min-h-screen p-4">
                    <h1 class="text-4xl font-bold mb-2">企業調度管理系統</h1>
                    <p class="text-orange-400 mb-12">雲端連線成功，請選擇部門</p>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 w-full max-w-6xl">
                        ${RoleCard('admin', 'fa-user-shield', '管理員')}
                        ${RoleCard('purchase', 'fa-shopping-cart', '採購部')}
                        ${RoleCard('logistics', 'fa-truck', '廠務部')}
                        ${RoleCard('warehouse', 'fa-warehouse', '倉管部')}
                    </div>
                </div>
            `;
        }

        function RoleCard(role, icon, label) {
            return `
                <div onclick="updateState({currentRole: '${role}', view: 'dashboard'})" 
                     class="card-bg border-2 border-transparent hover:border-orange-500 cursor-pointer p-10 rounded-2xl flex flex-col items-center justify-center transition-all transform hover:-translate-y-1">
                    <i class="fas ${icon} text-4xl mb-4 ${role === 'admin' ? 'text-orange-400' : 'text-blue-400'}"></i>
                    <span class="text-xl font-bold">${label}</span>
                </div>
            `;
        }

        function NewTaskView() {
            return `
                ${Navbar()}
                <div class="max-w-2xl mx-auto mt-12 p-8 bg-white rounded-3xl text-gray-900 shadow-2xl">
                    <h2 class="text-2xl font-bold mb-6">新增調度任務</h2>
                    <form id="taskForm" onsubmit="handleTaskSubmit(event)">
                        <div class="mb-4">
                            <label class="block text-sm font-bold mb-1">任務類別</label>
                            <select id="type" class="w-full p-3 border rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-500">
                                <option value="加工品">加工件 (需載回)</option>
                                <option value="備品銷售">備品銷售 (直送客戶)</option>
                            </select>
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-bold mb-1">對象名稱</label>
                            <input id="target" required placeholder="對象名稱 (工廠或客戶)" class="w-full p-3 border rounded-xl bg-gray-50 focus:outline-none focus:ring-2 focus:ring-orange-500">
                        </div>
                        <div class="mb-2">
                            <label class="block text-sm font-bold mb-1">品項明細</label>
                        </div>
                        <div id="itemsContainer" class="mb-4 space-y-2">
                            <div class="flex gap-2">
                                <input placeholder="品項名稱" class="flex-grow p-3 border rounded-xl bg-gray-50" required>
                                <input placeholder="數量" class="w-20 p-3 border rounded-xl bg-gray-50" required>
                                <input placeholder="單位" class="w-20 p-3 border rounded-xl bg-gray-50" required>
                            </div>
                        </div>
                        <button type="button" onclick="addItemRow()" class="text-blue-600 font-bold text-sm mb-6 inline-block hover:text-blue-800 transition">+ 增加品項</button>
                        <button type="submit" class="w-full py-4 bg-slate-900 text-white rounded-2xl font-bold text-lg hover:bg-slate-800 transition">送出並儲存</button>
                    </form>
                </div>
            `;
        }

        function DashboardView() {
            let displayOrders = state.orders;

            return `
                ${Navbar()}
                <div class="p-8 max-w-7xl mx-auto">
                    <div class="flex justify-between items-center mb-8">
                        <h2 class="text-2xl font-bold">全廠調度看板 (${displayOrders.length})</h2>
                        <div class="text-sm text-gray-400">目前身分：${state.currentRole === 'admin' ? '系統管理員' : '部門檢視模式'}</div>
                    </div>
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        ${displayOrders.length === 0 ? '<p class="col-span-full text-center py-20 text-gray-500">目前系統內無任何單據</p>' : displayOrders.sort((a,b) => b.id.localeCompare(a.id)).map(o => OrderCard(o)).join('')}
                    </div>
                </div>
            `;
        }

        function OrderCard(order) {
            const statusColors = {
                '待執行': 'bg-red-500',
                '加工中': 'bg-yellow-600',
                '待載回': 'bg-blue-500',
                '待入庫': 'bg-orange-500',
                '結案': 'bg-green-600'
            };

            let actionButtons = '';
            
            if (state.currentRole === 'logistics') {
                if (order.status === '待執行') {
                    actionButtons = `<button onclick="changeStatus('${order.id}', '${order.type === '加工品' ? '加工中' : '結案'}')" class="w-full mt-4 bg-blue-600 py-2 rounded-lg font-bold">${order.type === '加工品' ? '回報：已送達工廠' : '回報：已送交客戶'}</button>`;
                } else if (order.status === '待載回') {
                    actionButtons = `<button onclick="changeStatus('${order.id}', '待入庫')" class="w-full mt-4 bg-orange-600 py-2 rounded-lg font-bold">回報：已載回廠內</button>`;
                }
            } 
            else if (state.currentRole === 'purchase') {
                if (order.status === '加工中') {
                    actionButtons = `<button onclick="changeStatus('${order.id}', '待載回')" class="w-full mt-4 bg-green-600 py-2 rounded-lg font-bold">確認加工完成 (轉待載回)</button>`;
                }
            }
            else if (state.currentRole === 'warehouse') {
                if (order.status === '待入庫') {
                    actionButtons = `<button onclick="changeStatus('${order.id}', '結案')" class="w-full mt-4 bg-green-700 py-2 rounded-lg font-bold">確認入庫並結案</button>`;
                }
            }
            else if (state.currentRole === 'admin') {
                actionButtons = `<button onclick="deleteOrder('${order.id}')" class="w-full mt-4 bg-red-900 py-2 rounded-lg font-bold text-xs hover:bg-red-700 transition">刪除單據 (清理歷史資料)</button>`;
            }

            return `
                <div class="card-bg p-6 rounded-2xl shadow-lg border border-gray-700 hover:border-gray-500 transition">
                    <div class="flex justify-between items-start mb-4">
                        <span class="text-xs text-gray-400">${order.id}</span>
                        <span class="${statusColors[order.status]} status-badge">${order.status}</span>
                    </div>
                    <div class="mb-4">
                        <span class="text-xs text-orange-400 block mb-1">${order.type}</span>
                        <h3 class="text-xl font-bold">${order.target}</h3>
                    </div>
                    <div class="space-y-1 mb-4 text-sm text-gray-300 bg-slate-800/50 p-3 rounded-lg">
                        ${order.items.map(i => `<div class="flex justify-between items-center"><span class="truncate pr-2">• ${i.name}</span><span class="text-orange-300 font-medium shrink-0">${i.qty} ${i.unit || ''}</span></div>`).join('')}
                    </div>
                    <div class="text-[10px] text-gray-500 border-t border-gray-700 pt-3">
                        建立時間: ${order.createdAt}
                    </div>
                    ${actionButtons}
                </div>
            `;
        }

        // --- 事件處理 ---

        window.addItemRow = function() {
            const container = document.getElementById('itemsContainer');
            const div = document.createElement('div');
            div.className = 'flex gap-2';
            div.innerHTML = `
                <input placeholder="品項名稱" class="flex-grow p-3 border rounded-xl bg-gray-50" required>
                <input placeholder="數量" class="w-20 p-3 border rounded-xl bg-gray-50" required>
                <input placeholder="單位" class="w-20 p-3 border rounded-xl bg-gray-50" required>
            `;
            container.appendChild(div);
        };

        window.handleTaskSubmit = function(e) {
            e.preventDefault();
            const type = document.getElementById('type').value;
            const target = document.getElementById('target').value;
            const itemRows = document.getElementById('itemsContainer').children;
            const items = [];
            for (let row of itemRows) {
                const inputs = row.querySelectorAll('input');
                items.push({ 
                    name: inputs[0].value, 
                    qty: inputs[1].value,
                    unit: inputs[2].value
                });
            }
            addOrder({ type, target, items });
        };

        // --- 主渲染邏輯 ---

        function render() {
            const app = document.getElementById('app');
            if (state.currentRole === 'portal') {
                app.innerHTML = PortalView();
            } else if (state.view === 'newTask') {
                app.innerHTML = NewTaskView();
            } else {
                app.innerHTML = DashboardView();
            }
        }

        // 初始啟動
        render();

    </script>
</body>
</html>
